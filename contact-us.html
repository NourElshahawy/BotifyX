        <div class="my-container">
            <div class="nav-content">
                <a href="/" class="logo">
                    <!-- <img src="./assets/images/X-white.svg" alt="X-white"> -->
                    <div class="images">
                        <img src="./assets/images/X-white.svg" alt="X-white">
                    </div>
                </a>

                <ul class="links">
                    <li class="active">
                        <a href="/">الرئيسية</a>
                    </li>
                    <li>
                        <a href="#">لماذا نحن</a>
                    </li>
                    <li>
                        <a href="/our-solutions-mobile.html">حلولنا</a>
                    </li>
                    <li>
                        <a href="/projects.html">مشاريعنا</a>
                    </li>
                    <li>
                        <a href="/working.html">آلية العمل</a>
                    </li>
                </ul>

                <div class="nav-actions">
                    <div class="main-btn">
                        <span class="main-btn-circle"></span>
                        <a href="#" class="main-btn-inner">
                            <span class="main-btn-text">
                                ارتقِ بأعمالك
                            </span>
                        </a>
                    </div>

                    <div class="show-menu">
                        <i class="fa-solid fa-bars"></i>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <section class="request-form">
            <div class="my-container">
                <div class="form-container">
                    <div class="main-title section-reveal-scale" data-aos="zoom-in-down" data-aos-duration="1500">
                        <h2>نموذج طلب استشارة ذكية</h2>
                        <p>نحن في BotifyX نأخذ خصوصيتك بجدية تامة. جميع المعلومات المرسلة محمية بنظام تشفير عالي، وتخضع
                            لـ اتفاقية سرية المعلومات (NDA) منذ اللحظة الأولى</p>
                    </div>

                    <form action="">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="input-group">
                                    <input type="text" name="" placeholder="اسم الشركة / الجهة" id="name-company">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group">
                                    <input type="text" name="" placeholder="الاسم كامل" id="name">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group">
                                    <input type="email" name="" placeholder="الإيميل" id="email">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="input-group">
                                    <input type="tel" name="" placeholder="رقم الجوال" id="phone">
                                </div>
                            </div>
                            <div class="col-md-2">
                                <div class="custom-dropdown">
                                    <div class="selected" id="selectedCountry">
                                        <span class="arrow-bottom">
                                            <i class="fa-solid fa-angle-down"></i>
                                        </span>
                                        <img src="https://flagcdn.com/w40/sa.png" />
                                        <span>+966</span>
                                    </div>

                                    <div class="dropdown" id="dropdownList">
                                        <div class="option" data-code="+20">
                                            <img src="https://flagcdn.com/w40/eg.png" />
                                            <span>+20</span>
                                        </div>
                                        <div class="option" data-code="+971">
                                            <img src="https://flagcdn.com/w40/ae.png" />
                                            <span>+971</span>
                                        </div>
                                        <div class="option" data-code="+1">
                                            <img src="https://flagcdn.com/w40/us.png" />
                                            <span>+1</span>
                                        </div>
                                    </div>

                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="input-group custom-select-box">
                                    <span class="arrow-bottom">
                                        <i class="fa-solid fa-angle-down"></i>
                                    </span>
                                    <select id="serviceSelect">
                                        <option value="" disabled selected>نوع الخدمة المطلوبة</option>
                                        <option value="web">تطوير موقع ويب</option>
                                        <option value="uiux">تصميم UI/UX</option>
                                        <option value="mobile">تطبيق موبايل</option>
                                        <option value="seo">تحسين محركات البحث (SEO)</option>
                                        <option value="marketing">تسويق إلكتروني</option>
                                        <option value="other">أخرى</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="input-group">
                                    <input type="tel" name="" placeholder="الميزانية التقريبية للمشروع" id="budget">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="input-group">
                                    <textarea name="" placeholder="لمحة سريعة عن المشروع"
                                        id="overview-project"></textarea>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="input-group file-upload">
                                    <input type="file" id="fileInput" hidden />

                                    <label for="fileInput" class="upload-btn">
                                        <img src="./assets/images/upload-img.svg" alt="upload" />
                                        <span>إرفاق ملف (RFP أو فكرة المشروع)</span>
                                    </label>

                                    <p id="fileName" class="file-name"></p>
                                </div>
                            </div>
                        </div>

                        <div class="main-btn">
                            <span class="main-btn-circle"></span>
                            <a href="#" class="main-btn-inner">
                                <span class="main-btn-text">
                                    أرسل طلبك لنبدأ الرحلة
                                    <i class="fa-solid fa-circle-chevron-left"></i>
                                </span>
                            </a>
                        </div>
                    </form>
                </div>

            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

    <script src="./js/index.js" defer></script>
